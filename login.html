<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - NexusAI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #0b0b0b;
            --surface-color: #1a1a1a;
            --primary-color: #ffcc00;
            --primary-hover: #e6b800;
            --text-color: #ffffff;
            --text-muted: #888888;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
            border-radius: 50%;
            width: 400px;
            height: 400px;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            background: var(--primary-color);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            background: #ffffff;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }

        a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1;
        }

        .auth-box {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            text-align: center;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-box h1 {
            margin-bottom: 30px;
            color: var(--text-color);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            background-color: #000;
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.1);
        }

        .input-group input:focus+label {
            color: var(--primary-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--primary-color);
            color: #000;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-google {
            background-color: white;
            color: #333;
        }

        .btn-google:hover {
            background-color: #f8f8f8;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
        }

        .btn-google svg {
            width: 22px;
            height: 22px;
        }

        .auth-links {
            margin-top: 24px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .logo-small {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--primary-color);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            color: #000;
            font-size: 16px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="logo-small">
                <div class="logo-icon">N</div>
                <div class="logo-text">NexusAI</div>
            </a>
            <h1>Welcome Back</h1>
            <div id="error-message"
                style="color: #ff5555; background: rgba(255,85,85,0.1); padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 0.9rem; text-align: left;">
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" id="loginBtn">Log In</button>
            </form>

            <div class="divider">OR</div>

            <button class="btn btn-google" id="googleLoginBtn">
                <svg viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Continue with Google
            </button>

            <div class="auth-links">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithEmailAndPassword, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcvPgEk2LOxzgYNH4MzCzCFwDPP3SQSIA",
            authDomain: "chatbot-5ae99.firebaseapp.com",
            databaseURL: "https://chatbot-5ae99-default-rtdb.firebaseio.com",
            projectId: "chatbot-5ae99",
            storageBucket: "chatbot-5ae99.firebasestorage.app",
            messagingSenderId: "898526698205",
            appId: "1:898526698205:web:19e30c154f7ab4ee2e1934"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'chat.html';
            }
        });

        const loginForm = document.getElementById('loginForm');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const errorMsg = document.getElementById('error-message');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.textContent = 'Logging in...';
            loginBtn.style.opacity = '0.7';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect handled by onAuthStateChanged
            } catch (error) {
                loginBtn.textContent = 'Log In';
                loginBtn.style.opacity = '1';
                errorMsg.textContent = error.message.replace('Firebase:', '').trim();
                errorMsg.style.display = 'block';
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                errorMsg.textContent = error.message.replace('Firebase:', '').trim();
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
